<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Caledonia Taxi</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #080811;
      font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
      color: #fff;
    }
    .login-card {
      background: #111118;
      border: 1px solid #222230;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 24px;
    }
    .login-logo-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px; height: 56px;
      border-radius: 14px;
      background: #f0a500;
      font-size: 28px;
      margin-bottom: 12px;
    }
    .login-title {
      font-size: 1.5rem; font-weight: 700; text-align: center; margin-bottom: 4px;
    }
    .login-subtitle {
      font-size: 0.875rem; color: #888; text-align: center; margin-bottom: 32px;
    }
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block; font-size: 0.75rem; font-weight: 500; color: #888;
      text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px;
    }
    .form-input {
      width: 100%; padding: 12px 14px;
      background: #1a1a22; border: 1px solid #2a2a38; border-radius: 8px;
      color: #fff; font-size: 0.9375rem; outline: none; transition: border-color 150ms;
    }
    .form-input:focus { border-color: #f0a500; }
    .btn-login {
      width: 100%; padding: 13px;
      background: #f0a500; color: #000; font-weight: 700; font-size: 0.9375rem;
      border: none; border-radius: 8px; cursor: pointer;
      transition: opacity 150ms, transform 100ms; margin-top: 8px;
    }
    .btn-login:hover { opacity: 0.9; }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg {
      display: none; font-size: 0.875rem; text-align: center;
      margin-top: 12px; padding: 10px; border-radius: 6px;
    }
    .msg--error { color: #ef4444; background: rgba(239,68,68,0.1); }
    .msg--lockout { color: #f59e0b; background: rgba(245,158,11,0.1); }
    .spin { display: inline-block; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    [data-theme="dark"] body { background: #080811; }
    [data-theme="light"] body { background: #f8f8f6; color: #111; }
    [data-theme="light"] .login-card { background: #fff; border-color: #e5e5e5; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    [data-theme="light"] .form-input { background: #f5f5f5; border-color: #ddd; color: #111; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-mark">🚕</div>
      <h1 class="login-title">Caledonia Taxi</h1>
      <p class="login-subtitle">Admin Portal — Hamilton, Ontario</p>
    </div>
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label" for="password">Admin Password</label>
        <input class="form-input" type="password" id="password"
               placeholder="Enter admin password"
               autocomplete="current-password" required>
      </div>
      <button class="btn-login" type="submit" id="loginBtn">Sign In</button>
      <div class="msg msg--error" id="errorMsg"></div>
      <div class="msg msg--lockout" id="lockoutMsg"></div>
    </form>
  </div>

  <script>
    document.getElementById('password').focus();

    // Apply saved theme
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);
    else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
      document.documentElement.setAttribute('data-theme', 'light');
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errorEl = document.getElementById('errorMsg');
      const lockoutEl = document.getElementById('lockoutMsg');
      const password = document.getElementById('password').value;

      errorEl.style.display = 'none';
      lockoutEl.style.display = 'none';
      btn.disabled = true;
      btn.innerHTML = '<span class="spin">&#8987;</span> Signing in&hellip;';

      try {
        const res = await fetch('/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
          credentials: 'include'
        });
        const data = await res.json();

        if (res.status === 423) {
          lockoutEl.textContent = data.detail || 'Account locked. Try again later.';
          lockoutEl.style.display = 'block';
        } else if (!res.ok) {
          errorEl.textContent = data.detail || 'Invalid password. Please try again.';
          errorEl.style.display = 'block';
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        } else {
          const next = new URLSearchParams(window.location.search).get('next') || '/admin';
          window.location.href = next;
        }
      } catch {
        errorEl.textContent = 'Network error. Please try again.';
        errorEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Sign In';
      }
    }
  </script>
</body>
</html>
