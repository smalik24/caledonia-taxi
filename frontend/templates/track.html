<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Your Ride — Caledonia Taxi</title>

  <!-- Fonts -->
  <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700,800&f[]=satoshi@400,500,700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="/static/css/tokens.css">
  <link rel="stylesheet" href="/static/css/base.css">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <style>
  body { overflow: hidden; }

  .track-app {
    height: 100svh;
    display: flex;
    flex-direction: column;
  }

  /* Top bar */
  .track-topbar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    z-index: 50;
    padding: var(--space-3) var(--space-4);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-3);
  }

  .track-back {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-full);
    padding: var(--space-2) var(--space-4);
    font-size: var(--text-sm);
    font-weight: 600;
    color: var(--color-text);
    text-decoration: none;
    box-shadow: var(--shadow-md);
  }

  .track-back:hover { background: var(--color-surface-offset); }

  .track-id-pill {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-full);
    padding: var(--space-2) var(--space-4);
    font-size: var(--text-xs);
    font-weight: 700;
    color: var(--color-text-muted);
    font-family: var(--font-mono);
    box-shadow: var(--shadow-md);
    letter-spacing: 0.05em;
  }

  /* Map background */
  .track-map {
    flex: 1;
    position: relative;
    background: var(--color-surface-offset);
    overflow: hidden;
  }

  .track-map__grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(var(--color-border) 1px, transparent 1px),
      linear-gradient(90deg, var(--color-border) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: 0.4;
  }

  .track-map__glow {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 50% at 50% 50%, color-mix(in oklab, var(--color-accent) 8%, transparent) 0%, transparent 70%);
  }

  /* Route visualization */
  .route-viz {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .route-svg {
    width: 80%;
    max-width: 500px;
    height: auto;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.1));
  }

  /* Driver marker */
  .driver-marker {
    position: absolute;
    width: 48px;
    height: 48px;
    border-radius: var(--radius-full);
    background: var(--color-accent);
    border: 3px solid white;
    box-shadow: var(--shadow-lg);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--color-accent-text);
    font-size: 20px;
    animation: driver-pulse 2s ease-in-out infinite;
    cursor: pointer;
    z-index: 10;
  }

  @keyframes driver-pulse {
    0%, 100% {
      box-shadow: var(--shadow-lg), 0 0 0 0 color-mix(in oklab, var(--color-accent) 50%, transparent);
    }
    50% {
      box-shadow: var(--shadow-lg), 0 0 0 12px transparent;
    }
  }

  /* Bottom sheet */
  .track-sheet {
    background: var(--color-surface);
    border-top: 1px solid var(--color-border);
    border-radius: var(--radius-2xl) var(--radius-2xl) 0 0;
    padding: var(--space-1) var(--space-5) var(--space-6);
    box-shadow: 0 -8px 32px rgba(0,0,0,0.1);
    flex-shrink: 0;
    max-height: 55vh;
    overflow-y: auto;
  }

  .sheet-handle {
    width: 36px;
    height: 4px;
    background: var(--color-border);
    border-radius: 2px;
    margin: var(--space-3) auto var(--space-5);
  }

  /* Status header */
  .track-status {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: var(--space-5);
  }

  .track-status__left { display: flex; flex-direction: column; gap: var(--space-1); }
  .track-status__label { font-size: var(--text-xs); color: var(--color-text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
  .track-status__value { font-size: var(--text-xl); font-weight: 800; letter-spacing: -0.03em; }

  .track-eta {
    text-align: right;
  }
  .track-eta__number { font-family: var(--font-display); font-size: var(--text-2xl); font-weight: 900; letter-spacing: -0.05em; color: var(--color-accent); line-height: 1; }
  .track-eta__label { font-size: var(--text-xs); color: var(--color-text-muted); }

  /* Progress bar */
  .progress-track {
    background: var(--color-surface-offset);
    border-radius: var(--radius-full);
    height: 6px;
    margin-bottom: var(--space-5);
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--color-accent), color-mix(in oklab, var(--color-accent) 70%, var(--color-success)));
    border-radius: var(--radius-full);
    transition: width 0.5s ease;
  }

  /* Driver info card */
  .driver-info-card {
    display: flex;
    align-items: center;
    gap: var(--space-4);
    background: var(--color-surface-offset);
    border-radius: var(--radius-xl);
    padding: var(--space-4);
    margin-bottom: var(--space-5);
  }

  .track-driver-avatar {
    width: 52px;
    height: 52px;
    background: var(--color-accent);
    border-radius: var(--radius-full);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: var(--text-base);
    font-weight: 700;
    color: var(--color-accent-text);
    flex-shrink: 0;
  }

  .driver-details { flex: 1; }
  .driver-name-track { font-weight: 700; font-size: var(--text-base); }
  .driver-vehicle-track { font-size: var(--text-sm); color: var(--color-text-muted); }

  .driver-rating-track {
    display: flex;
    align-items: center;
    gap: var(--space-1);
    font-size: var(--text-sm);
    font-weight: 700;
    color: var(--color-accent);
  }

  /* Action buttons */
  .track-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--space-3);
    margin-bottom: var(--space-5);
  }

  /* Route summary */
  .track-route {
    display: flex;
    flex-direction: column;
    gap: var(--space-3);
    padding: var(--space-4);
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    margin-bottom: var(--space-4);
  }

  .track-route-item {
    display: flex;
    align-items: flex-start;
    gap: var(--space-3);
  }

  .track-route-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 4px;
  }

  .track-route-label { font-size: var(--text-xs); color: var(--color-text-muted); font-weight: 600; margin-bottom: 2px; }
  .track-route-addr  { font-size: var(--text-sm); font-weight: 600; }

  /* Status steps */
  .status-steps {
    display: flex;
    justify-content: space-between;
    position: relative;
    margin-bottom: var(--space-5);
  }

  .status-steps::before {
    content: '';
    position: absolute;
    top: 14px;
    left: 20px;
    right: 20px;
    height: 2px;
    background: var(--color-border);
    z-index: 0;
  }

  .status-step {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: var(--space-2);
    position: relative;
    z-index: 1;
    flex: 1;
  }

  .status-step__dot {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--color-surface-offset);
    border: 2px solid var(--color-border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: var(--color-text-muted);
    transition: all var(--transition-interactive);
  }

  .status-step.done .status-step__dot {
    background: var(--color-success);
    border-color: var(--color-success);
    color: white;
  }

  .status-step.active .status-step__dot {
    background: var(--color-accent);
    border-color: var(--color-accent);
    color: var(--color-accent-text);
    box-shadow: 0 0 0 4px var(--color-accent-highlight);
  }

  .status-step__label {
    font-size: var(--text-xs);
    font-weight: 600;
    color: var(--color-text-muted);
    white-space: nowrap;
    text-align: center;
  }

  .status-step.active .status-step__label,
  .status-step.done .status-step__label {
    color: var(--color-text);
  }

  #leafletTrackMap { height: 320px; width: 100%; border-radius: var(--radius-xl); }
  </style>
</head>
<body>
  <div class="track-app">
    <!-- Map area -->
    <div class="track-map">
      <div class="track-map__grid"></div>
      <div class="track-map__glow"></div>

      <div id="leafletTrackMap"></div>

      <!-- Top bar -->
      <div class="track-topbar">
        <a href="/" class="track-back">
          <i data-lucide="arrow-left" width="16" height="16"></i>
          Home
        </a>
        <div class="track-id-pill" id="topBookingId">{{ booking_id }}</div>
        <button class="track-back" style="border:none;cursor:pointer" onclick="toggleTheme()">
          <i data-lucide="sun-moon" width="16" height="16"></i>
        </button>
      </div>
    </div>

    <!-- Bottom sheet -->
    <div class="track-sheet" id="trackSheet">
      <div class="sheet-handle"></div>

      <!-- Status header -->
      <div class="track-status">
        <div class="track-status__left">
          <div class="track-status__label">Status</div>
          <div class="track-status__value" id="statusText">Driver En Route</div>
        </div>
        <div class="track-eta">
          <div class="track-eta__number" id="etaMin">8</div>
          <div class="track-eta__label">min away</div>
        </div>
      </div>

      <!-- Status steps -->
      <div class="status-steps">
        <div class="status-step done" id="stepPending">
          <div class="status-step__dot">✓</div>
          <div class="status-step__label">Booked</div>
        </div>
        <div class="status-step active" id="stepDispatched">
          <div class="status-step__dot">2</div>
          <div class="status-step__label">En Route</div>
        </div>
        <div class="status-step" id="stepArrived">
          <div class="status-step__dot">3</div>
          <div class="status-step__label">Arrived</div>
        </div>
        <div class="status-step" id="stepInProgress">
          <div class="status-step__dot">4</div>
          <div class="status-step__label">In Ride</div>
        </div>
        <div class="status-step" id="stepCompleted">
          <div class="status-step__dot">✓</div>
          <div class="status-step__label">Done</div>
        </div>
      </div>

      <!-- Progress bar -->
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:25%"></div>
      </div>

      <!-- Driver card -->
      <div class="driver-info-card" id="driverCard">
        <div class="track-driver-avatar" id="driverInitials">SA</div>
        <div class="driver-details">
          <div class="driver-name-track" id="driverName">Saqib A.</div>
          <div class="driver-vehicle-track" id="driverVehicle">Toyota Camry · DEMO-01</div>
        </div>
        <div class="driver-rating-track">
          <i data-lucide="star" width="14" height="14" fill="currentColor"></i>
          <span id="driverRating">4.9</span>
        </div>
      </div>

      <!-- Actions -->
      <div class="track-actions">
        <a id="callDriver" href="tel:" class="btn btn--outline btn--lg" style="justify-content:center">
          <i data-lucide="phone" width="18" height="18"></i>
          Call Driver
        </a>
        <a href="/" class="btn btn--ghost btn--lg" style="justify-content:center">
          <i data-lucide="x" width="18" height="18"></i>
          Cancel
        </a>
      </div>

      <!-- Route summary -->
      <div class="track-route">
        <div class="track-route-item">
          <div class="track-route-dot" style="background:var(--color-success)"></div>
          <div>
            <div class="track-route-label">Pickup</div>
            <div class="track-route-addr" id="trackPickup">Loading…</div>
          </div>
        </div>
        <div class="track-route-item">
          <div class="track-route-dot" style="background:var(--color-error)"></div>
          <div>
            <div class="track-route-label">Drop-off</div>
            <div class="track-route-addr" id="trackDropoff">Loading…</div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div style="text-align:center;margin-top:var(--space-4)">
        <p style="font-size:var(--text-xs);color:var(--color-text-muted)">
          Need help? Call dispatch: <a href="tel:+12895551001" style="color:var(--color-accent);font-weight:600">(289) 555-1001</a>
        </p>
      </div>
      <p style="font-size:var(--text-xs);color:var(--color-text-faint);text-align:center;margin-top:var(--space-3)">
        <a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener noreferrer" style="color:inherit">Created with Perplexity Computer</a>
      </p>
    </div>
  </div>

  <script>
  lucide.createIcons();

  // Theme
  let darkMode = matchMedia('(prefers-color-scheme:dark)').matches;
  document.documentElement.setAttribute('data-theme', darkMode ? 'dark' : 'light');

  function toggleTheme() {
    darkMode = !darkMode;
    document.documentElement.setAttribute('data-theme', darkMode ? 'dark' : 'light');
  }

  // Get booking ID from URL
  const bookingId = window.location.pathname.split('/').pop() || 'UNKNOWN';
  document.getElementById('topBookingId').textContent = bookingId;

  // Status mapping
  const statusConfig = {
    pending:        { text: 'Booking Confirmed',    eta: '—',  progress: 10, step: 'stepPending' },
    dispatched:     { text: 'Driver En Route',       eta: '8',  progress: 30, step: 'stepDispatched' },
    accepted:       { text: 'Driver Accepted',       eta: '6',  progress: 40, step: 'stepDispatched' },
    in_progress:    { text: 'You\'re in the ride!',  eta: '—',  progress: 70, step: 'stepInProgress' },
    completed:      { text: 'Ride Complete!',         eta: '—',  progress: 100, step: 'stepCompleted' },
    cancelled:      { text: 'Ride Cancelled',         eta: '—',  progress: 0,  step: null },
  };

  function updateUI(data) {
    if (!data) return;
    const status = data.status || 'dispatched';
    const config = statusConfig[status] || statusConfig.dispatched;

    document.getElementById('statusText').textContent = config.text;
    document.getElementById('etaMin').textContent = config.eta;
    document.getElementById('progressFill').style.width = config.progress + '%';

    if (data.pickup)   document.getElementById('trackPickup').textContent = data.pickup;
    if (data.dropoff)  document.getElementById('trackDropoff').textContent = data.dropoff;

    if (data.driver) {
      const d = data.driver;
      const name = d.name || 'Driver';
      document.getElementById('driverInitials').textContent = name.substr(0,2).toUpperCase();
      document.getElementById('driverName').textContent = name;
      document.getElementById('driverVehicle').textContent = [d.vehicle, d.plate].filter(Boolean).join(' · ') || 'Standard Sedan';
      document.getElementById('driverRating').textContent = d.rating || '4.9';
      if (d.phone) document.getElementById('callDriver').href = `tel:${d.phone}`;

      if (d.lat && d.lng) moveDriverMarker(d.lat, d.lng);
      else initTrackMap(43.2557, -79.8711);
    }

    // Update step indicators
    const steps = ['stepPending', 'stepDispatched', 'stepArrived', 'stepInProgress', 'stepCompleted'];
    const activeIdx = steps.indexOf(config.step);
    steps.forEach((id, idx) => {
      const el = document.getElementById(id);
      if (!el) return;
      el.classList.remove('done', 'active');
      if (idx < activeIdx) el.classList.add('done');
      else if (idx === activeIdx) el.classList.add('active');
    });

    lucide.createIcons();
  }

  // ── Leaflet Map ──────────────────────────────────────────
  let trackMap = null;
  let driverMarkerL = null;

  function initTrackMap(lat, lng) {
    if (trackMap) return;
    const el = document.getElementById('leafletTrackMap');
    if (!el) return;
    trackMap = L.map('leafletTrackMap').setView([lat || 43.2557, lng || -79.8711], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap', maxZoom: 19
    }).addTo(trackMap);
  }

  function moveDriverMarker(lat, lng) {
    if (!trackMap) initTrackMap(lat, lng);
    const icon = L.divIcon({
      className: '',
      html: '<div style="width:32px;height:32px;background:#f0a500;border-radius:50%;border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center">🚕</div>',
      iconSize: [32,32], iconAnchor: [16,16]
    });
    if (driverMarkerL) {
      driverMarkerL.setLatLng([lat, lng]);
    } else {
      driverMarkerL = L.marker([lat, lng], { icon }).addTo(trackMap);
    }
    trackMap.panTo([lat, lng]);
  }

  // Fetch tracking data
  async function fetchTracking() {
    try {
      const res = await fetch(`/api/track/${bookingId}`);
      if (res.ok) {
        const data = await res.json();
        updateUI(data);
      } else {
        // Demo data
        updateUI({
          status: 'dispatched',
          pickup: '123 King St W, Hamilton, ON',
          dropoff: 'Hamilton Airport, Mount Hope, ON',
          driver: { name: 'Saqib A.', vehicle: 'Toyota Camry', plate: 'DEMO-01', rating: 4.9 }
        });
      }
    } catch {
      updateUI({
        status: 'dispatched',
        pickup: '123 King St W, Hamilton, ON',
        dropoff: 'Hamilton Airport, Mount Hope, ON',
        driver: { name: 'Saqib A.', vehicle: 'Toyota Camry', plate: 'DEMO-01', rating: 4.9 }
      });
    }
  }

  // ── WebSocket real-time tracking ──────────────────────────
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  let trackWs, trackRetry = 1000;

  function connectTrackWS() {
    try {
      trackWs = new WebSocket(`${proto}//${location.host}/ws/track_${bookingId}`);
      trackWs.onopen = () => { trackRetry = 1000; };
      trackWs.onmessage = (e) => {
        try {
          const msg = JSON.parse(e.data);
          if (msg.type === 'location_update' && msg.lat && msg.lng) {
            moveDriverMarker(msg.lat, msg.lng);
          }
          if (msg.type === 'booking_update') {
            fetchTracking();
          }
        } catch(err) {}
      };
      trackWs.onclose = () => setTimeout(connectTrackWS, Math.min(trackRetry *= 2, 30000));
      trackWs.onerror = () => trackWs.close();
    } catch(e) {}
  }

  fetchTracking();
  setInterval(fetchTracking, 10000);
  connectTrackWS();
  </script>
</body>
</html>
